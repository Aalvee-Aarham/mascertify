services:
  # Backend API Server
  - type: web
    name: mascertify-api
    runtime: node
    startCommand: cd server && node index.js
    buildCommand: cd server && npm install
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        scope: build
      - key: JWT_SECRET
        scope: build
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        value: https://mascertify.onrender.com

  # Frontend Static Site
  - type: static
    name: mascertify
    buildCommand: cd client && npm install && npx vite build
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_URL
        value: https://mascertify-api.onrender.com
